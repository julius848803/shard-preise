<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>OPSUCHT Quest Übersicht</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0e1117;--bg2:#151920;--bg3:#1c2230;--bg4:#222a38;
  --border:#1e2736;--border2:#253045;
  --cyan:#00e5c8;--cyan-dim:rgba(0,229,200,.12);--cyan-glow:rgba(0,229,200,.25);
  --purple:#a855f7;--purple-dim:rgba(168,85,247,.12);
  --green:#22c55e;--red:#ef4444;--orange:#f97316;
  --yellow:#eab308;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#4a5568;
  --max-w:1200px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}

/* ── HEADER ── */
header{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header-inner{max-width:var(--max-w);margin:0 auto;padding:16px 20px;display:flex;align-items:center;gap:12px}
.h-icon{width:38px;height:38px;background:rgba(0,229,200,.12);border:1px solid rgba(0,229,200,.4);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.h-title h1{font-size:17px;font-weight:700;letter-spacing:-.3px}
.h-title p{font-size:11px;color:var(--text2);margin-top:1px}
.h-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.h-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:6px 14px;cursor:pointer;transition:all .2s;text-decoration:none;display:flex;align-items:center;gap:5px}
.h-btn:hover{border-color:var(--cyan);color:var(--cyan)}

/* ── FILTER BAR ── */
.filter-wrap{background:var(--bg2);border-bottom:1px solid var(--border)}
.filter-inner{max-width:var(--max-w);margin:0 auto;padding:12px 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.fsel{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:7px 12px;cursor:pointer;outline:none;transition:border-color .2s}
.fsel:hover,.fsel:focus{border-color:var(--cyan);color:var(--cyan)}
.tag-filter{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.tag-btn{padding:5px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:99px;cursor:pointer;transition:all .2s;font-size:11px;font-weight:500;color:var(--text2)}
.tag-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.tag-btn.active{background:var(--cyan-dim);border-color:var(--cyan);color:var(--cyan)}

/* ── MAIN ── */
main{padding:20px;max-width:var(--max-w);margin:0 auto}

/* ── QUEST GRID ── */
.quests-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}

/* ── QUEST CARD ── */
.quest-card{position:relative;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;overflow:hidden;transition:border-color .2s,transform .15s}
.quest-card:hover{transform:translateY(-2px);border-color:var(--border2)}
.quest-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.quest-card.daily::before{background:linear-gradient(90deg,var(--orange),var(--yellow))}
.quest-card.weekly::before{background:linear-gradient(90deg,var(--cyan),var(--purple))}

.qc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.qtype-badge{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:4px 10px;border-radius:99px}
.qtype-badge.daily{background:rgba(249,115,22,.15);border:1px solid rgba(249,115,22,.3);color:var(--orange)}
.qtype-badge.weekly{background:var(--cyan-dim);border:1px solid var(--cyan-glow);color:var(--cyan)}
.qdate{font-size:11px;color:var(--text3);font-family:'Share Tech Mono',monospace}

.qtitle{font-size:15px;font-weight:600;color:var(--text);margin-bottom:8px;line-height:1.4}
.qitems{font-size:13px;color:var(--text2);margin-bottom:14px;padding:10px 12px;background:var(--bg3);border-radius:8px;border:1px solid var(--border2);line-height:1.5}

.qc-bottom{display:flex;align-items:center;justify-content:space-between;padding-top:14px;border-top:1px solid var(--border)}
.qshards{font-size:20px;font-weight:700;color:var(--cyan);letter-spacing:-.5px}
.qshards small{font-size:11px;font-weight:400;color:var(--text3);margin-left:3px}
.qtags{display:flex;gap:6px;flex-wrap:wrap}
.qtag{padding:3px 9px;background:var(--purple-dim);border:1px solid rgba(168,85,247,.25);color:var(--purple);border-radius:99px;font-size:10px;font-weight:600}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:80px 20px;color:var(--text3)}
.empty-state h2{font-size:18px;color:var(--text2);margin-bottom:8px}
.empty-state p{font-size:13px}

@media(max-width:600px){
  .quests-grid{grid-template-columns:1fr}
  .filter-inner{flex-direction:column;align-items:flex-start}
  .h-title p{display:none}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="h-icon">📋</div>
    <div class="h-title">
      <h1>OPSUCHT Quest Übersicht</h1>
      <p>Alle täglichen und wöchentlichen Quests</p>
    </div>
    <div class="h-actions">
      <a href="index.html" class="h-btn">📊 Kurse</a>
      <a href="admin.html" class="h-btn">🔐 Admin</a>
    </div>
  </div>
</header>

<div class="filter-wrap">
  <div class="filter-inner">
    <select class="fsel" id="typeFilter">
      <option value="all">Alle Zeiträume</option>
      <option value="daily">Täglich</option>
      <option value="weekly">Wöchentlich</option>
    </select>
    <select class="fsel" id="sortBy">
      <option value="date-desc">Neueste zuerst</option>
      <option value="date-asc">Älteste zuerst</option>
      <option value="shards-desc">Meiste Shards</option>
      <option value="shards-asc">Wenigste Shards</option>
    </select>
    <div class="tag-filter" id="tagFilter"></div>
  </div>
</div>

<main>
  <div class="quests-grid" id="questsGrid"></div>
</main>

<script>
function loadQuests(){
  return JSON.parse(localStorage.getItem('opsucht_quests')||'[]');
}

function getAllTags(){
  const s=new Set();
  loadQuests().forEach(q=>q.tags.forEach(t=>s.add(t)));
  return Array.from(s).sort();
}

function renderTagFilter(){
  const tf=document.getElementById('tagFilter');
  const tags=getAllTags();
  if(!tags.length){ tf.innerHTML=''; return; }
  tf.innerHTML=tags.map(t=>`<button class="tag-btn" data-tag="${t}">${t}</button>`).join('');
  tf.querySelectorAll('.tag-btn').forEach(b=>{
    b.addEventListener('click',()=>{ b.classList.toggle('active'); renderQuests(); });
  });
}

function escapeHtml(t){
  const d=document.createElement('div');
  d.textContent=t; return d.innerHTML;
}

function formatDate(s){
  return new Date(s).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});
}

function renderQuests(){
  const grid=document.getElementById('questsGrid');
  let q=loadQuests();

  const tf=document.getElementById('typeFilter').value;
  if(tf!=='all') q=q.filter(x=>x.type===tf);

  const active=Array.from(document.querySelectorAll('.tag-btn.active')).map(b=>b.dataset.tag);
  if(active.length) q=q.filter(x=>active.some(t=>x.tags.includes(t)));

  const sb=document.getElementById('sortBy').value;
  if(sb==='date-desc') q.sort((a,b)=>new Date(b.date)-new Date(a.date));
  else if(sb==='date-asc') q.sort((a,b)=>new Date(a.date)-new Date(b.date));
  else if(sb==='shards-desc') q.sort((a,b)=>b.shards-a.shards);
  else q.sort((a,b)=>a.shards-b.shards);

  if(!q.length){
    grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><h2>Keine Quests gefunden</h2><p>Noch keine Quests eingetragen oder Filter passt nicht.</p></div>`;
    return;
  }

  grid.innerHTML=q.map(quest=>`
    <div class="quest-card ${quest.type}">
      <div class="qc-top">
        <span class="qtype-badge ${quest.type}">${quest.type==='daily'?'📅 Täglich':'📆 Wöchentlich'}</span>
        <span class="qdate">${formatDate(quest.date)}</span>
      </div>
      <div class="qtitle">${escapeHtml(quest.task)}</div>
      <div class="qitems">📦 ${escapeHtml(quest.items)}</div>
      <div class="qc-bottom">
        <span class="qshards">💎 ${quest.shards}<small>Shards</small></span>
        ${quest.tags.length?`<div class="qtags">${quest.tags.map(t=>`<span class="qtag">${escapeHtml(t)}</span>`).join('')}</div>`:''}
      </div>
    </div>
  `).join('');
}

document.getElementById('typeFilter').addEventListener('change',renderQuests);
document.getElementById('sortBy').addEventListener('change',renderQuests);
window.addEventListener('storage',()=>{ renderTagFilter(); renderQuests(); });

renderTagFilter();
renderQuests();
</script>
</body>
</html>
