<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>OPSUCHT Quest Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0e1117;--bg2:#151920;--bg3:#1c2230;--bg4:#222a38;
  --border:#1e2736;--border2:#253045;
  --cyan:#00e5c8;--cyan-dim:rgba(0,229,200,.12);--cyan-glow:rgba(0,229,200,.25);
  --purple:#a855f7;--purple-dim:rgba(168,85,247,.12);
  --green:#22c55e;--red:#ef4444;--orange:#f97316;--yellow:#eab308;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#4a5568;
  --max-w:1300px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}

/* ── LOGIN ── */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{width:100%;max-width:380px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:36px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.login-icon{width:52px;height:52px;background:var(--cyan-dim);border:1px solid var(--cyan-glow);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 20px}
.login-box h1{text-align:center;font-size:20px;font-weight:700;margin-bottom:4px}
.login-sub{text-align:center;font-size:12px;color:var(--text3);margin-bottom:28px}

/* ── FORM ELEMENTS ── */
.fg{margin-bottom:16px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px}
.fg input,.fg select,.fg textarea{
  width:100%;padding:10px 14px;
  background:var(--bg3);border:1px solid var(--border2);border-radius:8px;
  color:var(--text);font-family:'Inter',sans-serif;font-size:13px;
  outline:none;transition:border-color .2s;
}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--cyan)}
.fg textarea{resize:vertical;min-height:70px}
.fg select option{background:var(--bg3)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none}
.btn-primary{background:linear-gradient(135deg,var(--cyan) 0%,#0bc5a8 100%);color:#0e1117;width:100%}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-secondary{background:var(--bg3);border:1px solid var(--border2);color:var(--text2)}
.btn-secondary:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-danger{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:var(--red)}
.btn-danger:hover{background:rgba(239,68,68,.25)}
.btn-sm{padding:6px 12px;font-size:11px}
.btn-full{width:100%}

.error-msg{font-size:12px;color:var(--red);text-align:center;margin-top:10px;min-height:18px}

/* ── HEADER ── */
header{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header-inner{max-width:var(--max-w);margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:12px}
.h-icon{width:36px;height:36px;background:var(--cyan-dim);border:1px solid var(--cyan-glow);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.h-title{font-size:15px;font-weight:700}
.h-user{margin-left:auto;display:flex;align-items:center;gap:10px}
.user-chip{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:5px 12px;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px}
.role-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── TABS ── */
nav{background:var(--bg2);border-bottom:1px solid var(--border)}
.nav-inner{max-width:var(--max-w);margin:0 auto;padding:0 20px;display:flex}
.nav-tab{background:none;border:none;cursor:pointer;color:var(--text2);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;padding:12px 18px;border-bottom:2px solid transparent;transition:all .2s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.nav-tab:disabled{opacity:.3;cursor:not-allowed}

/* ── MAIN ── */
main{padding:20px;max-width:var(--max-w);margin:0 auto}

/* ── PANEL BOX ── */
.panel-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px}
.panel-box h2{font-size:15px;font-weight:700;color:var(--text);margin-bottom:20px;display:flex;align-items:center;gap:8px}

/* ── GRID LAYOUT ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}}

/* ── TABLE ── */
.data-table{width:100%;border-collapse:collapse;margin-top:4px;font-size:13px}
.data-table th{background:var(--bg3);color:var(--text3);font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:10px 14px;text-align:left;border-bottom:1px solid var(--border2)}
.data-table td{padding:12px 14px;border-bottom:1px solid var(--border);color:var(--text2)}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:var(--bg3)}
.data-table td strong{color:var(--text)}

/* ── BADGES ── */
.type-badge{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:3px 9px;border-radius:99px}
.type-badge.daily{background:rgba(249,115,22,.15);border:1px solid rgba(249,115,22,.3);color:var(--orange)}
.type-badge.weekly{background:var(--cyan-dim);border:1px solid var(--cyan-glow);color:var(--cyan)}

.role-badge{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:3px 9px;border-radius:99px}
.role-badge.owner{background:rgba(234,179,8,.15);border:1px solid rgba(234,179,8,.3);color:var(--yellow)}
.role-badge.admin{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:var(--red)}
.role-badge.editor{background:var(--cyan-dim);border:1px solid var(--cyan-glow);color:var(--cyan)}
.role-badge.viewer{background:var(--bg3);border:1px solid var(--border2);color:var(--text3)}

.tag-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:var(--purple-dim);border:1px solid rgba(168,85,247,.25);color:var(--purple);border-radius:99px;font-size:10px;font-weight:600;margin:2px}

/* ── TAGS INPUT ── */
.tags-wrap{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:8px;min-height:44px;display:flex;flex-wrap:wrap;gap:6px;align-items:flex-start;transition:border-color .2s;cursor:text}
.tags-wrap:focus-within{border-color:var(--cyan)}
.tag-item{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--purple-dim);border:1px solid rgba(168,85,247,.25);color:var(--purple);border-radius:99px;font-size:11px;font-weight:600}
.tag-item button{background:none;border:none;color:var(--purple);cursor:pointer;font-size:14px;line-height:1;padding:0;opacity:.7}
.tag-item button:hover{opacity:1}
.tag-input{background:none;border:none;outline:none;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;min-width:120px;flex:1;padding:2px 4px}
.tag-input::placeholder{color:var(--text3)}

/* ── ACTION BTNS ── */
.action-row{display:flex;gap:8px}

/* ── HIDDEN ── */
.hidden{display:none!important}

/* ── STATS BAR ── */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 18px}
.stat-label{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.stat-value{font-size:22px;font-weight:700}

@media(max-width:768px){
  .stats-bar{grid-template-columns:1fr 1fr}
  .h-user .user-chip span:not(.role-dot){display:none}
}
@media(max-width:500px){
  .stats-bar{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="loginScreen" class="login-wrap">
  <div class="login-box">
    <div class="login-icon">🔐</div>
    <h1>Quest Admin</h1>
    <p class="login-sub">OPSUCHT Verwaltung</p>
    <div class="fg">
      <label>Benutzername</label>
      <input type="text" id="loginUsername" placeholder="Benutzername" autocomplete="username"/>
    </div>
    <div class="fg">
      <label>Passwort</label>
      <input type="password" id="loginPassword" placeholder="Passwort" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()"/>
    </div>
    <button class="btn btn-primary" onclick="login()">Anmelden</button>
    <div class="error-msg" id="loginError"></div>
  </div>
</div>

<!-- ══ DASHBOARD ══ -->
<div id="dashboard" class="hidden">

  <header>
    <div class="header-inner">
      <div class="h-icon">📋</div>
      <div class="h-title">Quest Administration</div>
      <div class="h-user">
        <div class="user-chip">
          <span class="role-dot" id="roleDot"></span>
          <span id="userChipText"></span>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="logout()">Abmelden</button>
        <a href="quest.html" class="btn btn-secondary btn-sm">👁️ Ansicht</a>
      </div>
    </div>
  </header>

  <nav>
    <div class="nav-inner">
      <button class="nav-tab active" id="tabQuests" onclick="switchTab('quests',this)">📋 Quests</button>
      <button class="nav-tab" id="tabUsers" onclick="switchTab('users',this)">👥 Benutzer</button>
    </div>
  </nav>

  <main>

    <!-- ══ QUESTS PANEL ══ -->
    <div id="panelQuests">

      <div class="stats-bar" id="statsBar"></div>

      <!-- Quest Form -->
      <div class="panel-box" id="questFormBox">
        <h2>➕ Quest erstellen / bearbeiten</h2>
        <input type="hidden" id="editQuestId"/>
        <div class="form-grid">
          <div class="fg">
            <label>Aufgabe *</label>
            <input type="text" id="questTask" placeholder="z.B. Sammle Diamanten" required/>
          </div>
          <div class="fg">
            <label>Items & Anzahl *</label>
            <input type="text" id="questItems" placeholder="z.B. 64 Diamanten" required/>
          </div>
          <div class="fg">
            <label>Shards *</label>
            <input type="number" id="questShards" placeholder="z.B. 150" min="0" required/>
          </div>
          <div class="fg">
            <label>Zeitraum *</label>
            <select id="questType">
              <option value="daily">📅 Täglich</option>
              <option value="weekly">📆 Wöchentlich</option>
            </select>
          </div>
          <div class="fg">
            <label>Datum *</label>
            <input type="date" id="questDate" required/>
          </div>
          <div class="fg">
            <label>Tags</label>
            <div class="tags-wrap" id="tagsContainer" onclick="document.getElementById('tagInput').focus()">
              <input class="tag-input" type="text" id="tagInput" placeholder="Tag + Enter"/>
            </div>
          </div>
        </div>
        <div style="display:flex;gap:10px;margin-top:6px">
          <button class="btn btn-primary" style="max-width:200px" id="saveQuestBtn" onclick="saveQuest()">💾 Speichern</button>
          <button class="btn btn-secondary hidden" id="cancelEditBtn" onclick="cancelEdit()">Abbrechen</button>
        </div>
      </div>

      <!-- Quest Table -->
      <div class="panel-box">
        <h2>📋 Alle Quests</h2>
        <table class="data-table">
          <thead>
            <tr>
              <th>Datum</th>
              <th>Typ</th>
              <th>Aufgabe</th>
              <th>Items</th>
              <th>Shards</th>
              <th>Tags</th>
              <th>Aktionen</th>
            </tr>
          </thead>
          <tbody id="questsTableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- ══ USERS PANEL ══ -->
    <div id="panelUsers" class="hidden">

      <!-- Add User Form -->
      <div class="panel-box" id="userFormBox">
        <h2>➕ Benutzer erstellen</h2>
        <div class="form-grid">
          <div class="fg">
            <label>Benutzername *</label>
            <input type="text" id="newUsername" placeholder="Benutzername"/>
          </div>
          <div class="fg">
            <label>Passwort *</label>
            <input type="password" id="newPassword" placeholder="Passwort"/>
          </div>
          <div class="fg">
            <label>Rolle *</label>
            <select id="newRole">
              <option value="admin">🔴 Admin (Volle Rechte)</option>
              <option value="editor">🔵 Editor (Quests bearbeiten)</option>
              <option value="viewer">⚫ Viewer (Nur lesen)</option>
            </select>
          </div>
        </div>
        <button class="btn btn-primary" style="max-width:200px;margin-top:6px" onclick="saveUser()">👤 Erstellen</button>
      </div>

      <!-- Change Own Password -->
      <div class="panel-box">
        <h2>🔑 Eigenes Passwort ändern</h2>
        <div class="form-grid">
          <div class="fg">
            <label>Altes Passwort</label>
            <input type="password" id="oldPw" placeholder="Aktuelles Passwort"/>
          </div>
          <div class="fg">
            <label>Neues Passwort</label>
            <input type="password" id="newPw" placeholder="Neues Passwort"/>
          </div>
        </div>
        <button class="btn btn-secondary" style="max-width:200px;margin-top:6px" onclick="changeOwnPassword()">🔒 Passwort ändern</button>
      </div>

      <!-- Users Table -->
      <div class="panel-box">
        <h2>👥 Alle Benutzer</h2>
        <table class="data-table">
          <thead>
            <tr>
              <th>Benutzername</th>
              <th>Rolle</th>
              <th>Aktionen</th>
            </tr>
          </thead>
          <tbody id="usersTableBody"></tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<script>
/* ══════════════════════════════════════════
   SICHERHEIT: Passwörter werden als SHA-256
   Hash gespeichert — niemals im Klartext.
   ══════════════════════════════════════════ */

// SHA-256 via Web Crypto API
async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ── INIT: Einmaliges Setup beim ersten Aufruf ──
async function initializeSystem(){
  const initialized=localStorage.getItem('opsucht_initialized');
  if(initialized) return;

  // Nur xXLuckyGamer04Xx als Besitzer — Kr3pp1 wurde entfernt
  // Standard-Passwort "changeme123" — BITTE SOFORT ÄNDERN
  const ownerHash=await sha256('changeme123');
  const users=[
    { username:'xXLuckyGamer04Xx', passwordHash:ownerHash, role:'owner' }
  ];
  localStorage.setItem('opsucht_users',JSON.stringify(users));
  localStorage.setItem('opsucht_initialized','1');
}

// ── LOGIN ──
async function login(){
  const username=document.getElementById('loginUsername').value.trim();
  const password=document.getElementById('loginPassword').value;
  const errEl=document.getElementById('loginError');
  errEl.textContent='';

  if(!username||!password){ errEl.textContent='Bitte alle Felder ausfüllen.'; return; }

  const hash=await sha256(password);
  const users=JSON.parse(localStorage.getItem('opsucht_users')||'[]');
  const user=users.find(u=>u.username===username && u.passwordHash===hash);

  if(user){
    sessionStorage.setItem('currentUser',JSON.stringify({username:user.username,role:user.role}));
    showDashboard();
  } else {
    errEl.textContent='Ungültiger Benutzername oder Passwort.';
  }
}

// ── LOGOUT ──
function logout(){
  sessionStorage.removeItem('currentUser');
  location.reload();
}

// ── DASHBOARD ANZEIGEN ──
function showDashboard(){
  const cu=JSON.parse(sessionStorage.getItem('currentUser'));
  if(!cu) return;

  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');

  // User-Chip
  const dotColors={owner:'#eab308',admin:'#ef4444',editor:'#00e5c8',viewer:'#4a5568'};
  document.getElementById('roleDot').style.background=dotColors[cu.role]||'#4a5568';
  document.getElementById('userChipText').textContent=`${cu.username} · ${getRoleLabel(cu.role)}`;

  // Tab-Sichtbarkeit
  const canManageUsers=cu.role==='owner'||cu.role==='admin';
  if(!canManageUsers) document.getElementById('tabUsers').disabled=true;

  // Formular sichtbar nur für editor+
  if(cu.role==='viewer') document.getElementById('questFormBox').classList.add('hidden');

  document.getElementById('questDate').valueAsDate=new Date();
  renderStats();
  renderQuests();
  renderUsers();
}

function getRoleLabel(r){
  return {owner:'👑 Besitzer',admin:'🔴 Admin',editor:'🔵 Editor',viewer:'⚫ Viewer'}[r]||r;
}

// ── TAB WECHSEL ──
function switchTab(name,btn){
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panelQuests').classList.toggle('hidden',name!=='quests');
  document.getElementById('panelUsers').classList.toggle('hidden',name!=='users');
}

// ══ QUEST LOGIK ══

let currentTags=[];

document.addEventListener('DOMContentLoaded',()=>{
  const ti=document.getElementById('tagInput');
  if(ti) ti.addEventListener('keydown',(e)=>{
    if(e.key==='Enter'&&ti.value.trim()){
      e.preventDefault();
      const t=ti.value.trim();
      if(!currentTags.includes(t)) currentTags.push(t);
      renderTagsInput();
      ti.value='';
    }
  });
});

function renderTagsInput(){
  const c=document.getElementById('tagsContainer');
  const items=currentTags.map(t=>`
    <div class="tag-item">${t}<button type="button" onclick="removeTag('${t}')">×</button></div>
  `).join('');
  c.innerHTML=items+'<input class="tag-input" type="text" id="tagInput" placeholder="Tag + Enter"/>';
  const ti=document.getElementById('tagInput');
  ti.addEventListener('keydown',(e)=>{
    if(e.key==='Enter'&&ti.value.trim()){
      e.preventDefault();
      const t=ti.value.trim();
      if(!currentTags.includes(t)) currentTags.push(t);
      renderTagsInput();
    }
  });
  ti.focus();
}

function removeTag(t){
  currentTags=currentTags.filter(x=>x!==t);
  renderTagsInput();
}

function saveQuest(){
  const cu=JSON.parse(sessionStorage.getItem('currentUser'));
  if(cu.role==='viewer'){ alert('Keine Berechtigung!'); return; }

  const task=document.getElementById('questTask').value.trim();
  const items=document.getElementById('questItems').value.trim();
  const shards=parseInt(document.getElementById('questShards').value);
  const type=document.getElementById('questType').value;
  const date=document.getElementById('questDate').value;
  const editId=document.getElementById('editQuestId').value;

  if(!task||!items||!shards||!date){ alert('Bitte alle Pflichtfelder ausfüllen.'); return; }

  let quests=JSON.parse(localStorage.getItem('opsucht_quests')||'[]');
  const quest={ id:editId||Date.now().toString(), task, items, shards, type, date, tags:currentTags };

  if(editId){
    const idx=quests.findIndex(q=>q.id===editId);
    if(idx>-1) quests[idx]=quest;
  } else {
    quests.push(quest);
  }

  localStorage.setItem('opsucht_quests',JSON.stringify(quests));
  cancelEdit();
  renderQuests();
  renderStats();
}

function editQuest(id){
  const cu=JSON.parse(sessionStorage.getItem('currentUser'));
  if(cu.role==='viewer') return;
  const q=JSON.parse(localStorage.getItem('opsucht_quests')||'[]').find(x=>x.id===id);
  if(!q) return;
  document.getElementById('editQuestId').value=q.id;
  document.getElementById('questTask').value=q.task;
  document.getElementById('questItems').value=q.items;
  document.getElementById('questShards').value=q.shards;
  document.getElementById('questType').value=q.type;
  document.getElementById('questDate').value=q.date;
  currentTags=[...q.tags];
  renderTagsInput();
  document.getElementById('saveQuestBtn').textContent='💾 Aktualisieren';
  document.getElementById('cancelEditBtn').classList.remove('hidden');
  window.scrollTo({top:0,behavior:'smooth'});
}

function deleteQuest(id){
  const cu=JSON.parse(sessionStorage.getItem('currentUser'));
  if(cu.role==='viewer'){ alert('Keine Berechtigung!'); return; }
  if(!confirm('Quest wirklich löschen?')) return;
  let q=JSON.parse(localStorage.getItem('opsucht_quests')||'[]');
  localStorage.setItem('opsucht_quests',JSON.stringify(q.filter(x=>x.id!==id)));
  renderQuests();
  renderStats();
}

function cancelEdit(){
  document.getElementById('editQuestId').value='';
  document.getElementById('questTask').value='';
  document.getElementById('questItems').value='';
  document.getElementById('questShards').value='';
  document.getElementById('questType').value='daily';
  document.getElementById('questDate').valueAsDate=new Date();
  currentTags=[];
  renderTagsInput();
  document.getElementById('saveQuestBtn').textContent='💾 Speichern';
  document.getElementById('cancelEditBtn').classList.add('hidden');
}

function renderQuests(){
  const tbody=document.getElementById('questsTableBody');
  const cu=JSON.parse(sessionStorage.getItem('currentUser'));
  let q=JSON.parse(localStorage.getItem('opsucht_quests')||'[]');
  q.sort((a,b)=>new Date(b.date)-new Date(a.date));
  const canEdit=cu.role!=='viewer';

  if(!q.length){
    tbody.innerHTML='<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text3)">Noch keine Quests vorhanden</td></tr>';
    return;
  }

  tbody.innerHTML=q.map(quest=>`
    <tr>
      <td style="font-family:'Share Tech Mono',monospace;font-size:12px">${formatDate(quest.date)}</td>
      <td><span class="type-badge ${quest.type}">${quest.type==='daily'?'Täglich':'Wöchentlich'}</span></td>
      <td><strong>${esc(quest.task)}</strong></td>
      <td style="color:var(--text2)">${esc(quest.items)}</td>
      <td style="color:var(--cyan);font-weight:700">${quest.shards} 💎</td>
      <td>${quest.tags.map(t=>`<span class="tag-pill">${esc(t)}</span>`).join('')}</td>
      <td>
        <div class="action-row">
          ${canEdit?`<button class="btn btn-secondary btn-sm" onclick="editQuest('${quest.id}')">✏️</button>`:''}
          ${canEdit?`<button class="btn btn-danger btn-sm" onclick="deleteQuest('${quest.id}')">🗑️</button>`:''}
          ${!canEdit?'<span style="color:var(--text3);font-size:12px">Nur lesen</span>':''}
        </div>
      </td>
    </tr>
  `).join('');
}

function renderStats(){
  const q=JSON.parse(localStorage.getItem('opsucht_quests')||'[]');
  const daily=q.filter(x=>x.type==='daily').length;
  const weekly=q.filter(x=>x.type==='weekly').length;
  const avgShards=q.length?Math.round(q.reduce((a,b)=>a+b.shards,0)/q.length):0;
  const bar=document.getElementById('statsBar');
  bar.innerHTML=`
    <div class="stat-card"><div class="stat-label">Gesamt</div><div class="stat-value" style="color:var(--cyan)">${q.length}</div></div>
    <div class="stat-card"><div class="stat-label">Täglich</div><div class="stat-value" style="color:var(--orange)">${daily}</div></div>
    <div class="stat-card"><div class="stat-label">Wöchentlich</div><div class="stat-value" style="color:var(--purple)">${weekly}</div></div>
    <div class="stat-card"><div class="stat-label">Ø Shards</div><div class="stat-value" style="color:var(--green)">${avgShards}</div></div>
  `;
}

// ══ USER LOGIK ══

async function saveUser(){
  const cu=JSON.parse(sessionStorage.getItem('currentUser'));
  // Nur Owner und Admin dürfen User erstellen
  if(cu.role!=='owner'&&cu.role!=='admin'){ alert('Keine Berechtigung!'); return; }

  const username=document.getElementById('newUsername').value.trim();
  const password=document.getElementById('newPassword').value;
  const role=document.getElementById('newRole').value;

  if(!username||!password){ alert('Bitte alle Felder ausfüllen.'); return; }

  // Admin darf keine owner-Rolle vergeben
  if(cu.role==='admin'&&role==='owner'){ alert('Nur der Besitzer darf andere Besitzer ernennen!'); return; }

  let users=JSON.parse(localStorage.getItem('opsucht_users')||'[]');
  if(users.find(u=>u.username===username)){ alert('Dieser Benutzername existiert bereits!'); return; }

  const hash=await sha256(password);
  users.push({ username, passwordHash:hash, role });
  localStorage.setItem('opsucht_users',JSON.stringify(users));
  document.getElementById('newUsername').value='';
  document.getElementById('newPassword').value='';
  renderUsers();
  alert('Benutzer erstellt!');
}

async function changeOwnPassword(){
  const cu=JSON.parse(sessionStorage.getItem('currentUser'));
  const oldPw=document.getElementById('oldPw').value;
  const newPw=document.getElementById('newPw').value;

  if(!oldPw||!newPw){ alert('Bitte beide Felder ausfüllen.'); return; }
  if(newPw.length<6){ alert('Neues Passwort muss mindestens 6 Zeichen haben.'); return; }

  const oldHash=await sha256(oldPw);
  let users=JSON.parse(localStorage.getItem('opsucht_users')||'[]');
  const user=users.find(u=>u.username===cu.username&&u.passwordHash===oldHash);

  if(!user){ alert('Altes Passwort ist falsch!'); return; }

  user.passwordHash=await sha256(newPw);
  localStorage.setItem('opsucht_users',JSON.stringify(users));
  document.getElementById('oldPw').value='';
  document.getElementById('newPw').value='';
  alert('Passwort erfolgreich geändert!');
}

async function changeUserPassword(username){
  const cu=JSON.parse(sessionStorage.getItem('currentUser'));
  // Owner kann alle ändern, Admin kann alles außer Owner ändern
  const users=JSON.parse(localStorage.getItem('opsucht_users')||'[]');
  const targetUser=users.find(u=>u.username===username);
  if(!targetUser) return;
  if(cu.role==='admin'&&targetUser.role==='owner'){ alert('Admins können den Besitzer nicht bearbeiten!'); return; }

  const newPw=prompt(`Neues Passwort für "${username}":`);
  if(!newPw||newPw.length<6){ alert('Passwort muss mindestens 6 Zeichen haben.'); return; }

  targetUser.passwordHash=await sha256(newPw);
  localStorage.setItem('opsucht_users',JSON.stringify(users));
  alert(`Passwort von "${username}" geändert.`);
}

function changeUserRole(username){
  const cu=JSON.parse(sessionStorage.getItem('currentUser'));
  const users=JSON.parse(localStorage.getItem('opsucht_users')||'[]');
  const targetUser=users.find(u=>u.username===username);
  if(!targetUser) return;

  // Schutzmechanismus: Owner-Accounts können nur von anderen Ownern geändert werden
  if(targetUser.role==='owner'&&cu.role!=='owner'){ alert('Nur der Besitzer kann andere Besitzer bearbeiten!'); return; }
  // Admin darf keine Owner ernennen
  const allowedRoles=cu.role==='owner'?['owner','admin','editor','viewer']:['admin','editor','viewer'];

  const newRole=prompt(`Neue Rolle für "${username}":\n${allowedRoles.join(', ')}`);
  if(!newRole||!allowedRoles.includes(newRole)){ alert('Ungültige Rolle.'); return; }

  targetUser.role=newRole;
  localStorage.setItem('opsucht_users',JSON.stringify(users));
  renderUsers();
  alert(`Rolle von "${username}" zu "${newRole}" geändert.`);
}

function deleteUser(username){
  const cu=JSON.parse(sessionStorage.getItem('currentUser'));
  const users=JSON.parse(localStorage.getItem('opsucht_users')||'[]');
  const targetUser=users.find(u=>u.username===username);
  if(!targetUser) return;

  // Eigenen Account nicht löschen
  if(username===cu.username){ alert('Du kannst deinen eigenen Account nicht löschen!'); return; }
  // Owner-Schutz
  if(targetUser.role==='owner'&&cu.role!=='owner'){ alert('Nur der Besitzer kann andere Besitzer entfernen!'); return; }

  if(!confirm(`Benutzer "${username}" wirklich löschen?`)) return;
  localStorage.setItem('opsucht_users',JSON.stringify(users.filter(u=>u.username!==username)));
  renderUsers();
}

function renderUsers(){
  const tbody=document.getElementById('usersTableBody');
  const cu=JSON.parse(sessionStorage.getItem('currentUser'));
  const users=JSON.parse(localStorage.getItem('opsucht_users')||'[]');
  const canManage=cu.role==='owner'||cu.role==='admin';

  if(!canManage){ tbody.innerHTML='<tr><td colspan="3" style="text-align:center;padding:30px;color:var(--text3)">Keine Berechtigung</td></tr>'; return; }

  tbody.innerHTML=users.map(u=>{
    const isOwner=u.role==='owner';
    const isMe=u.username===cu.username;
    const canEditThis=cu.role==='owner'||(cu.role==='admin'&&!isOwner);

    return `
    <tr>
      <td><strong>${esc(u.username)}</strong>${isMe?' <span style="color:var(--text3);font-size:11px">(du)</span>':''}</td>
      <td><span class="role-badge ${u.role}">${getRoleLabel(u.role)}</span></td>
      <td>
        <div class="action-row">
          ${canEditThis&&!isMe?`<button class="btn btn-secondary btn-sm" onclick="changeUserRole('${u.username}')">🎭 Rolle</button>`:''}
          ${canEditThis?`<button class="btn btn-secondary btn-sm" onclick="changeUserPassword('${u.username}')">🔑 PW</button>`:''}
          ${canEditThis&&!isMe?`<button class="btn btn-danger btn-sm" onclick="deleteUser('${u.username}')">🗑️</button>`:''}
          ${(!canEditThis||isMe)&&!canEditThis?'<span style="color:var(--text3);font-size:11px">Geschützt</span>':''}
        </div>
      </td>
    </tr>`;
  }).join('');
}

// ── UTILS ──
function esc(t){
  const d=document.createElement('div');
  d.textContent=t; return d.innerHTML;
}

function formatDate(s){
  return new Date(s).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});
}

// ── BOOTSTRAP ──
window.onload=async function(){
  await initializeSystem();
  const cu=sessionStorage.getItem('currentUser');
  if(cu) showDashboard();
};
</script>
